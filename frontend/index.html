<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FOMO Market Simulation</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
    <style>
      :root {
        color-scheme: dark;
        --bg: #101112;
        --panel: #181a1b;
        --panel-soft: #202324;
        --line: #343839;
        --text: #f2f5f1;
        --muted: #9aa39b;
        --green: #22c55e;
        --yellow: #eab308;
        --red: #ef4444;
        --cyan: #38bdf8;
        --blue: #60a5fa;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      button,
      input {
        font: inherit;
      }

      .shell {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 360px;
        gap: 16px;
        min-height: 100vh;
        padding: 16px;
      }

      .main,
      .side {
        display: grid;
        gap: 16px;
        min-width: 0;
      }

      .main {
        grid-template-rows: auto minmax(260px, 32vh) minmax(430px, 1fr) auto;
      }

      .side {
        grid-template-rows: auto auto minmax(260px, 1fr);
        min-height: 0;
      }

      .topbar,
      .network-panel,
      .chart-panel,
      .metrics-panel,
      .control-panel,
      .event-panel,
      .chat-panel {
        border: 1px solid var(--line);
        background: var(--panel);
        border-radius: 8px;
      }

      .topbar {
        display: grid;
        grid-template-columns: minmax(220px, 1fr) repeat(6, minmax(92px, auto));
        gap: 12px;
        align-items: center;
        padding: 14px;
      }

      .brand {
        display: flex;
        flex-direction: column;
        gap: 3px;
        min-width: 0;
      }

      .brand h1 {
        margin: 0;
        font-size: 20px;
        font-weight: 700;
        letter-spacing: 0;
      }

      .brand span,
      .metric span,
      .chat-meta,
      .status,
      label {
        color: var(--muted);
        font-size: 12px;
      }

      .metric {
        min-width: 0;
        padding: 10px 12px;
        background: var(--panel-soft);
        border: 1px solid var(--line);
        border-radius: 6px;
      }

      .metric strong {
        display: block;
        margin-top: 4px;
        font-size: 18px;
        line-height: 1.1;
      }

      .metric .up,
      .up {
        color: var(--green);
      }

      .metric .down,
      .down {
        color: var(--red);
      }

      .network-panel {
        position: relative;
        overflow: hidden;
        min-height: 260px;
      }

      #network-canvas {
        position: absolute;
        inset: 0;
      }

      .legend {
        position: absolute;
        left: 14px;
        bottom: 14px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        padding: 8px;
        background: rgb(16 17 18 / 78%);
        border: 1px solid var(--line);
        border-radius: 6px;
      }

      .legend-item {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: var(--muted);
        font-size: 12px;
      }

      .dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
      }

      .chart-panel {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        min-height: 430px;
        padding: 14px;
      }

      .panel-header,
      .chat-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .panel-header {
        margin-bottom: 12px;
      }

      .panel-header h2,
      .chat-header h2 {
        margin: 0;
        font-size: 15px;
        letter-spacing: 0;
      }

      .chart-wrap {
        position: relative;
        min-height: 0;
      }

      .metrics-panel {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
        padding: 14px;
      }

      .bar {
        height: 8px;
        margin-top: 10px;
        overflow: hidden;
        background: #0f1011;
        border-radius: 999px;
      }

      .bar div {
        width: 50%;
        height: 100%;
        background: var(--cyan);
      }

      .control-panel {
        padding: 14px;
      }

      .preset-row {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
        margin-bottom: 12px;
      }

      .control-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .field {
        display: grid;
        gap: 5px;
        min-width: 0;
      }

      input {
        width: 100%;
        min-height: 34px;
        padding: 7px 9px;
        color: var(--text);
        background: #101112;
        border: 1px solid var(--line);
        border-radius: 6px;
      }

      input[type="checkbox"] {
        width: 18px;
        min-height: 18px;
        accent-color: var(--red);
      }

      .toggle-field {
        display: flex;
        align-items: center;
        justify-content: space-between;
        min-height: 34px;
        padding: 7px 9px;
        background: #101112;
        border: 1px solid var(--line);
        border-radius: 6px;
      }

      .button-row {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
        margin-top: 12px;
      }

      button {
        min-height: 36px;
        color: var(--text);
        background: var(--panel-soft);
        border: 1px solid var(--line);
        border-radius: 6px;
        cursor: pointer;
      }

      button.primary {
        color: #07100b;
        background: var(--green);
        border-color: var(--green);
        font-weight: 700;
      }

      .event-panel {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        min-height: 190px;
      }

      .event-panel .panel-header {
        padding: 14px;
        margin: 0;
        border-bottom: 1px solid var(--line);
      }

      #event-feed {
        display: flex;
        flex-direction: column;
        gap: 8px;
        min-height: 0;
        overflow: auto;
        padding: 14px;
      }

      .event-message {
        padding: 9px;
        background: var(--panel-soft);
        border: 1px solid var(--line);
        border-left: 3px solid var(--cyan);
        border-radius: 6px;
      }

      .event-message.danger {
        border-left-color: var(--red);
      }

      .event-message.warning {
        border-left-color: var(--yellow);
      }

      .event-message.success {
        border-left-color: var(--green);
      }

      .event-message p {
        margin: 4px 0 0;
        font-size: 13px;
        line-height: 1.3;
      }

      .chat-panel {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        min-height: 0;
      }

      .chat-header {
        padding: 14px;
        border-bottom: 1px solid var(--line);
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        white-space: nowrap;
      }

      .status-light {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--yellow);
      }

      .status-light.online {
        background: var(--green);
      }

      .status-light.offline {
        background: var(--red);
      }

      #chat-feed {
        display: flex;
        flex-direction: column;
        gap: 10px;
        min-height: 0;
        overflow: auto;
        padding: 14px;
      }

      .chat-message {
        padding: 10px;
        background: var(--panel-soft);
        border: 1px solid var(--line);
        border-left: 3px solid var(--red);
        border-radius: 6px;
      }

      .chat-message p {
        margin: 5px 0 0;
        color: var(--text);
        font-size: 14px;
        line-height: 1.35;
      }

      @media (max-width: 1080px) {
        .shell {
          grid-template-columns: 1fr;
        }

        .side {
          grid-template-columns: 1fr 1fr;
          grid-template-rows: auto;
        }

        .chat-panel {
          min-height: 360px;
        }
      }

      @media (max-width: 760px) {
        .shell {
          padding: 10px;
        }

        .topbar,
        .metrics-panel,
        .side {
          grid-template-columns: 1fr;
        }

        .control-grid {
          grid-template-columns: 1fr;
        }

        .network-panel {
          min-height: 280px;
        }

        .chart-panel {
          min-height: 360px;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <main class="main">
        <section class="topbar" aria-label="Market status">
          <div class="brand">
            <h1>FOMO Market Simulation</h1>
            <span id="tick-label">Tick 0</span>
          </div>
          <div class="metric">
            <span>Price</span>
            <strong id="price-value">--</strong>
          </div>
          <div class="metric">
            <span>Imbalance</span>
            <strong id="imbalance-value">--</strong>
          </div>
          <div class="metric">
            <span>Neutral</span>
            <strong id="neutral-count">--</strong>
          </div>
          <div class="metric">
            <span>Aware</span>
            <strong id="aware-count">--</strong>
          </div>
          <div class="metric">
            <span>Panic</span>
            <strong id="panic-count">--</strong>
          </div>
          <div class="metric">
            <span>Regime</span>
            <strong id="market-regime">--</strong>
          </div>
        </section>

        <section class="network-panel" aria-label="Agent network">
          <div id="network-canvas"></div>
          <div class="legend" aria-label="Agent state legend">
            <span class="legend-item"><span class="dot" style="background: var(--green)"></span>Neutral</span>
            <span class="legend-item"><span class="dot" style="background: var(--yellow)"></span>Aware</span>
            <span class="legend-item"><span class="dot" style="background: var(--red)"></span>Panic</span>
          </div>
        </section>

        <section class="chart-panel" aria-label="Live market chart">
          <div class="panel-header">
            <h2>Live Market</h2>
            <span id="history-label" class="status">0 samples</span>
          </div>
          <div class="chart-wrap">
            <canvas id="market-chart"></canvas>
          </div>
        </section>

        <section class="metrics-panel" aria-label="Order book">
          <div class="metric">
            <span>Buy Volume</span>
            <strong id="buy-volume">--</strong>
            <div class="bar"><div id="buy-bar"></div></div>
          </div>
          <div class="metric">
            <span>Sell Volume</span>
            <strong id="sell-volume">--</strong>
            <div class="bar"><div id="sell-bar"></div></div>
          </div>
          <div class="metric">
            <span>ARA / ARB</span>
            <strong><span id="ara-value">--</span> / <span id="arb-value">--</span></strong>
            <div class="bar"><div id="price-band"></div></div>
          </div>
          <div class="metric">
            <span>Auto Rejection</span>
            <strong id="rejection-state">Clear</strong>
            <div class="bar"><div id="rejection-bar"></div></div>
          </div>
        </section>
      </main>

      <aside class="side">
        <section class="control-panel" aria-label="Simulation controls">
          <div class="panel-header">
            <h2>Controls</h2>
            <span class="status"><span id="status-light" class="status-light"></span><span id="api-status">Connecting</span></span>
          </div>
          <div class="control-grid">
            <label class="field">Retail Agents<input id="numRetail" type="number" min="0" max="1000" step="1" value="100" /></label>
            <label class="field">Institutional<input id="numInstitutional" type="number" min="0" max="100" step="1" value="5" /></label>
            <label class="field">Base Price<input id="basePrice" type="number" min="1" step="1" value="100" /></label>
            <label class="field">Beta<input id="beta" type="number" min="0" max="1" step="0.01" value="0.15" /></label>
            <label class="field">Price Impact<input id="priceImpact" type="number" min="0" max="1" step="0.005" value="0.02" /></label>
            <label class="field">Tick Speed ms<input id="tickSpeed" type="number" min="150" max="10000" step="50" value="1200" /></label>
            <label class="field">Aware Fraction<input id="initialAwareFraction" type="number" min="0" max="1" step="0.01" value="0.10" /></label>
            <label class="field">Panic Fraction<input id="initialPanicFraction" type="number" min="0" max="1" step="0.01" value="0.05" /></label>
            <label class="field">ARA Percent<input id="araPercent" type="number" min="0" max="1" step="0.01" value="0.25" /></label>
            <label class="field">ARB Percent<input id="arbPercent" type="number" min="0" max="1" step="0.01" value="0.15" /></label>
            <label class="field">Shock Enabled<span class="toggle-field"><span>Market maker dump</span><input id="shockEnabled" type="checkbox" /></span></label>
            <label class="field">Shock Probability<input id="shockProbability" type="number" min="0" max="1" step="0.01" value="0" /></label>
            <label class="field">Shock Cooldown<input id="shockCooldownTicks" type="number" min="0" max="1000" step="1" value="5" /></label>
            <label class="field">Shock Min Vol<input id="shockMinVolume" type="number" min="1" step="1" value="25" /></label>
            <label class="field">Shock Max Vol<input id="shockMaxVolume" type="number" min="1" step="1" value="80" /></label>
            <label class="field">Panic Drawdown<input id="panicDrawdownThreshold" type="number" min="0" max="1" step="0.005" value="0.05" /></label>
            <label class="field">Panic Sensitivity<input id="panicSensitivity" type="number" min="0" max="1000" step="1" value="8" /></label>
            <label class="field">Panic Sell Mult<input id="panicSellMultiplier" type="number" min="1" max="1000" step="1" value="3" /></label>
          </div>
          <div class="preset-row">
            <button id="preset-fomo" type="button">FOMO Pump</button>
            <button id="preset-dump" type="button">Maker Dump</button>
            <button id="preset-arb" type="button">ARB Spiral</button>
          </div>
          <div class="button-row">
            <button id="run-toggle" type="button">Pause</button>
            <button id="step-button" type="button">Step</button>
            <button id="apply-button" class="primary" type="button">Apply</button>
          </div>
        </section>

        <section class="event-panel" aria-label="Market event feed">
          <div class="panel-header">
            <h2>Market Events</h2>
            <span id="event-count" class="status">0 events</span>
          </div>
          <div id="event-feed"></div>
        </section>

        <section class="chat-panel" aria-label="Agent chat feed">
          <div class="chat-header">
            <h2>Market Chat</h2>
            <span id="chat-count" class="status">0 messages</span>
          </div>
          <div id="chat-feed"></div>
        </section>
      </aside>
    </div>

    <script src="./sketch.js"></script>
  </body>
</html>
